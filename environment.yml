# ============================================================
# environment.yml  —  Conda environment
# Create: conda env create -f environment.yml
# Activate: conda activate metric-reliability
# ============================================================
name: metric-reliability

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10.12
  - pip>=23.0
  - cudatoolkit=11.8          # remove if CPU-only
  - pytorch>=2.0.0
  - numpy>=1.24.0
  - scipy>=1.11.0
  - pandas>=2.0.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - tqdm>=4.66.0

  - pip:
    - transformers==4.38.2
    - datasets>=2.18.0
    - huggingface-hub>=0.20.0
    - accelerate>=0.27.0
    - sacrebleu>=2.3.1
    - rouge-score>=0.1.3
    - nltk>=3.8.1
    - bert-score==0.3.13
    - sentence-transformers>=2.6.1
    - unbabel-comet>=2.2.1
    - openpyxl>=3.1.0
    - scikit-learn>=1.3.0
    - python-dotenv>=1.0.0
