name: Smoke Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies (excluding BLEURT)
        run: |
          python -m pip install --upgrade pip
          pip install datasets transformers==4.38.2 sacrebleu rouge-score pandas scipy tqdm nltk
          pip install bert-score==0.3.13 sentence-transformers unbabel-comet openpyxl matplotlib

      - name: Download NLTK data
        run: |
          python -c "import nltk; [nltk.download(p, quiet=True) for p in ['punkt','wordnet','omw-1.4']]"

      - name: Smoke test — BLEU (10 examples)
        run: |
          SMOKE_TEST=True python scripts/01_bleu_pipeline.py

      - name: Smoke test — ROUGE (10 examples)
        run: |
          SMOKE_TEST=True python scripts/02_rouge_pipeline.py

      - name: Smoke test — METEOR (10 examples)
        run: |
          SMOKE_TEST=True python scripts/05_meteor_pipeline.py

      - name: Smoke test — chrF++ (10 examples)
        run: |
          SMOKE_TEST=True python scripts/04_chrf_pipeline.py

      - name: Check outputs exist
        run: |
          ls outputs/bleu_final_outputs/bleu_stability_sample_level.csv
          ls outputs/rouge_final_outputs/rouge_stability_sample_level.csv
          ls outputs/meteor_outputs/meteor_stability_sample_level.csv
          ls outputs/chrfpp_outputs/chrfpp_stability_sample_level.csv
          echo "All expected output files exist."
